# Traefik static config — PRODUCTION / Docker Swarm mode
# Used by: deploy/docker/stack.yaml
# For local dev, the original traefik.yaml (file-provider only) is still used.

entryPoints:
  # Portal SPA + auth endpoints (HTTP — no domain/TLS yet)
  web:
    address: ":8000"
  # Bank payment API — mTLS only
  mtls:
    address: ":8443"
  # Note: Traefik v3 has a built-in 'traefik' entrypoint on :8080
  # for the internal API/dashboard. Do NOT define another entrypoint
  # on 8080 — it causes a 'address already in use' bind error.

api:
  dashboard: true
  # insecure: false (default) — exposed only via the explicit 'dashboard' router
  # in dynamic.yaml, which enforces basicAuth.

# Responds to GET /ping — used by Docker healthcheck
ping: {}

log:
  level: INFO
  format: json

accessLog:
  format: json

providers:
  # ── Docker Swarm provider (Traefik v3 syntax) ──────────────────────────────
  # In Traefik v3, Swarm mode is configured under `providers.swarm`,
  # NOT `providers.docker` with `swarmMode: true` (that was v2 syntax).
  swarm:
    endpoint: "unix:///var/run/docker.sock"
    network: payswitch_net
    exposedByDefault: false
    watch: true
    refreshSeconds: 15
  # ── File provider ──────────────────────────────────────────────────────────
  # Handles: TLS certificates + options (mTLS), all middleware definitions,
  # and the dashboard router (which can't be a service label because it targets
  # the internal api@internal service, not a Docker Swarm service).
  file:
    filename: /etc/traefik/dynamic.yaml
    watch: true

tracing:
  # Traefik v3: tracing.openTelemetry → tracing.otlp
  otlp:
    grpc:
      endpoint: "otelcol:4317"
      insecure: true
