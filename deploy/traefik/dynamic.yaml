# Traefik dynamic config — shared between Docker Compose and Docker Swarm.
#
# This file owns:
#   • TLS certificates and mTLS options (labels can't express these)
#   • All middleware definitions (referenced as @file from label routes)
#   • The dashboard router (targets api@internal — cannot be a service label)
#   • HTTP routes for Docker Compose mode (labels not used — Docker provider
#     can't access the socket from a non-root container).

tls:
  certificates:
    - certFile: /certs/server-cert.pem
      keyFile:  /certs/server-key.pem
  options:
    default:
      clientAuth:
        caFiles:
          - /certs/ca-cert.pem
        clientAuthType: VerifyClientCertIfGiven

http:
  routers:
    dashboard:
      entryPoints:
        - traefik
      rule: "PathPrefix(`/`)"
      service: api@internal

    # ── Local-dev routes (Docker Compose — no Docker provider) ─────────────
    payments:
      entryPoints:
        - mtls
      rule: "PathPrefix(`/payments`)"
      service: gateway
      tls: {}
      middlewares:
        - inject-participant-id
        - rate-limit-payments

    health:
      entryPoints:
        - mtls
      rule: "Path(`/healthz`)"
      service: gateway
      tls: {}

    portal-api:
      entryPoints:
        - web
      rule: "PathPrefix(`/portal/api`)"
      service: portal-api
      middlewares:
        - forward-auth
        - rate-limit-portal

    root-redirect:
      entryPoints:
        - web
      rule: "Path(`/`)"
      middlewares:
        - redirect-root
      service: portal-api

    portal-redirect:
      entryPoints:
        - web
      rule: "Path(`/portal`)"
      middlewares:
        - redirect-portal
      service: portal-api

    portal-spa:
      entryPoints:
        - web
      rule: "PathPrefix(`/portal/`)"
      service: portal-api
      middlewares:
        - forward-auth

    auth:
      entryPoints:
        - web
      rule: "Path(`/login`) || Path(`/logout`)"
      service: auth-service

  services:
    gateway:
      loadBalancer:
        servers:
          - url: "http://gateway:8080"

    portal-api:
      loadBalancer:
        servers:
          - url: "http://portal-api:8080"

    auth-service:
      loadBalancer:
        servers:
          - url: "http://auth-service:9000"

  middlewares:
    # Extracts mTLS client certificate CN → X-Forwarded-Client-Cert
    inject-participant-id:
      passTLSClientCert:
        info:
          subject:
            commonName: true

    rate-limit-payments:
      rateLimit:
        average: 2000000
        burst:   4000000
        period:  1m
        sourceCriterion:
          requestHeaderName: X-Forwarded-For

    rate-limit-portal:
      rateLimit:
        average: 300
        burst:   600
        period:  1m
        sourceCriterion:
          requestHeaderName: X-Forwarded-For

    # Forward-auth — validates session cookie with auth-service.
    # On success, auth-service injects identity headers that portal-api reads.
    forward-auth:
      forwardAuth:
        address: "http://auth-service:9000/auth"
        authResponseHeaders:
          - X-authentik-uid
          - X-authentik-username
          - X-authentik-name
          - X-authentik-email
          - X-authentik-groups
          - X-User-Role
          - X-Participant-Id

    # Redirect / → /portal/ so browsers hitting the root reach the SPA.
    redirect-root:
      redirectRegex:
        regex: "^(https?://[^/]+)/$"
        replacement: "${1}/portal/"
        permanent: false

    # Redirect /portal → /portal/ so the Go static file handler matches.
    redirect-portal:
      redirectRegex:
        regex: "^(https?://[^/]+)/portal$"
        replacement: "${1}/portal/"
        permanent: true

