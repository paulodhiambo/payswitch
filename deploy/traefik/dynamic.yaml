# Traefik dynamic config — shared between Docker Compose and Docker Swarm.
#
# This file owns:
#   • TLS certificates and mTLS options (labels can't express these)
#   • All middleware definitions (referenced as @file from label routes)
#   • The dashboard router (targets api@internal — cannot be a service label)
#
# HTTP routes (routers + services) come from container/service labels in
# compose.yaml (Docker provider) or stack.yaml (Swarm provider).

tls:
  certificates:
    - certFile: /certs/server-cert.pem
      keyFile:  /certs/server-key.pem
  options:
    default:
      clientAuth:
        caFiles:
          - /certs/ca-cert.pem
        authType: VerifyClientCertIfGiven

http:
  routers:
    dashboard:
      entryPoints:
        - traefik
      rule: "PathPrefix(`/`)"
      service: api@internal
      middlewares:
        - dashboard-auth

  middlewares:
    # Extracts mTLS client certificate CN → X-Forwarded-Client-Cert
    inject-participant-id:
      passTLSClientCert:
        info:
          subject:
            commonName: true

    rate-limit-payments:
      rateLimit:
        average: 2000000
        burst:   4000000
        period:  1m
        sourceCriterion:
          requestHeader: X-Forwarded-For

    rate-limit-portal:
      rateLimit:
        average: 300
        burst:   600
        period:  1m
        sourceCriterion:
          requestHeader: X-Forwarded-For

    # Forward-auth — validates session cookie with auth-service.
    # On success, auth-service injects identity headers that portal-api reads.
    forward-auth:
      forwardAuth:
        address: "http://auth-service:9000/auth"
        authResponseHeaders:
          - X-authentik-uid
          - X-authentik-username
          - X-authentik-name
          - X-authentik-email
          - X-authentik-groups
          - X-User-Role
          - X-Participant-Id

    # Redirect /portal → /portal/ so the Go static file handler matches.
    redirect-portal:
      redirectRegex:
        regex: "^/portal$"
        replacement: "/portal/"
        permanent: true

    # Dashboard basic auth.
    # usersFile is the Docker secret mounted at /run/secrets/dashboard_users.
    # htpasswd format: username:$apr1$<hash>
    # Created by pre-deploy.sh using: openssl passwd -apr1 "$TRAEFIK_DASHBOARD_PASSWORD"
    dashboard-auth:
      basicAuth:
        usersFile: "/run/secrets/dashboard_users"
        realm: "PaySwitch Operations"
        removeHeader: true   # strip Authorization before proxying to the dashboard
