entryPoints:
  web:
    address: ":8000"
  mtls:
    address: ":8443"
  traefik:
    address: ":8080"

api:
  dashboard: true

ping: {}

providers:
  docker:
    exposedByDefault: false
  file:
    filename: /etc/traefik/dynamic.yaml
    watch: true

tracing:
  openTelemetry:
    address: "otelcol:4317"
    insecure: true
