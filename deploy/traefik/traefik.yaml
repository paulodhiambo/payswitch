entryPoints:
  web:
    address: ":8000"
  mtls:
    address: ":8443"
  traefik:
    address: ":8080"

api:
  dashboard: true

ping: {}

accessLog: {}

metrics:
  prometheus:
    entryPoint: traefik
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true

providers:
  file:
    filename: /etc/traefik/dynamic.yaml
    watch: true

tracing:
  otlp:
    grpc:
      endpoint: "otelcol:4317"
      insecure: true
