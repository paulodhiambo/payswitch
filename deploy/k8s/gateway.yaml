apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: payment-switch
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: payment-switch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h postgres -U switch; do echo waiting for postgres; sleep 2; done
          env:
            - name: PGPASSWORD
              value: switch
        - name: migrate
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - psql "$POSTGRES_DSN" -f /schema/0001_init.sql
          envFrom:
            - configMapRef:
                name: payment-switch-config
          volumeMounts:
            - name: schema
              mountPath: /schema
      containers:
        - name: gateway
          image: payment-switch/gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: payment-switch-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: schema
          configMap:
            name: postgres-schema
