apiVersion: v1
kind: Secret
metadata:
  name: portal-api-secret
  namespace: payment-switch
type: Opaque
stringData:
  # 64-character hex string = 32 bytes of entropy.
  # Generate with: openssl rand -hex 32
  CSRF_SECRET: "REPLACE_WITH_32_BYTE_HEX_SECRET"
---
apiVersion: v1
kind: Service
metadata:
  name: portal-api
  namespace: payment-switch
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 9095
      targetPort: 9095
      name: metrics
  selector:
    app: portal-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-api
  namespace: payment-switch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portal-api
  template:
    metadata:
      labels:
        app: portal-api
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h postgres -U switch; do echo waiting for postgres; sleep 2; done
          env:
            - name: PGPASSWORD
              value: switch
        - name: migrate-portal
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - psql "$POSTGRES_DSN" -f /schema/0003_portal.sql
          envFrom:
            - configMapRef:
                name: payment-switch-config
          volumeMounts:
            - name: portal-schema
              mountPath: /schema
      containers:
        - name: portal-api
          image: payment-switch/portal-api:latest
          ports:
            - containerPort: 8080
            - containerPort: 9095
          envFrom:
            - configMapRef:
                name: payment-switch-config
            - secretRef:
                name: portal-api-secret
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: portal-schema
          configMap:
            name: portal-schema
