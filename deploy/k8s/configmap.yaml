apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-switch-config
  namespace: payment-switch
data:
  # Infrastructure
  POSTGRES_DSN: "postgres://switch:switch@postgres:5432/switch?sslmode=disable"
  KAFKA_BROKERS: "redpanda:9092"
  REDIS_ADDR: "redis:6379"
  OTLP_ENDPOINT: "tempo:4317"
  # Listener defaults (overridden per-pod where needed)
  HTTP_ADDR: ":8080"
  GRPC_ADDR: ":9090"
  METRICS_ADDR: ":9095"
  # Gateway → downstream service addresses
  COMPLIANCE_ADDR: "compliance-service:9090"
  LOOKUP_ADDR: "lookup-service:9090"
  SETTLEMENT_ADDR: "settlement-service:9090"
  QUOTING_ADDR: "quoting-service:9090"
  NOTIFICATION_ADDR: "notification-service:9090"
  ROUTING_ADDR: "routing-service:9090"
  RECONCILIATION_ADDR: "reconciliation-service:9090"
  # Portal API
  # PORTAL_ORIGIN: set to the SPA hostname if it differs from the API hostname,
  # e.g. https://portal.payment-switch.example.com. Leave empty when the SPA
  # and API share the same origin (served through the Authentik outpost).
  PORTAL_ORIGIN: ""
