apiVersion: v1
kind: Service
metadata:
  name: routing-service
  namespace: payment-switch
spec:
  ports:
    - port: 9090
      targetPort: 9090
      name: grpc
    - port: 9095
      targetPort: 9095
      name: metrics
  selector:
    app: routing-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: routing-service
  namespace: payment-switch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: routing-service
  template:
    metadata:
      labels:
        app: routing-service
    spec:
      containers:
        - name: routing-service
          image: payment-switch/routing-service:latest
          ports:
            - containerPort: 9090
            - containerPort: 9095
          envFrom:
            - configMapRef:
                name: payment-switch-config
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi
