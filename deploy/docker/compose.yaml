services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: switch
      POSTGRES_PASSWORD: switch
      POSTGRES_DB: switch
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U switch"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.4
    ports:
      - "9092:9092"
      - "9644:9644"
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --overprovisioned
      - --kafka-addr
      - 0.0.0.0:9092
      - --advertise-kafka-addr
      - redpanda:9092
      - --set
      - redpanda.auto_create_topics_enabled=true
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: gateway
    ports:
      - "8080:8080"
      - "9095:9095"
    environment:
      HTTP_ADDR: ":8080"
      METRICS_ADDR: ":9095"
      POSTGRES_DSN: "postgres://switch:switch@postgres:5432/switch?sslmode=disable"
      KAFKA_BROKERS: "redpanda:9092"
      REDIS_ADDR: "redis:6379"
      COMPLIANCE_ADDR: "compliance-service:9090"
      LOOKUP_ADDR: "lookup-service:9090"
      SETTLEMENT_ADDR: "settlement-service:9090"
    depends_on:
      postgres: { condition: service_healthy }
      redpanda: { condition: service_healthy }
      redis: { condition: service_healthy }

  compliance-service:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: compliance-service
    ports:
      - "9091:9090"
      - "9096:9095"
    environment:
      GRPC_ADDR: ":9090"
      METRICS_ADDR: ":9095"

  lookup-service:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: lookup-service
    ports:
      - "9092:9090"
      - "9097:9095"
    environment:
      GRPC_ADDR: ":9090"
      METRICS_ADDR: ":9095"
      REDIS_ADDR: "redis:6379"
    depends_on:
      redis: { condition: service_healthy }

  settlement-service:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: settlement-service
    ports:
      - "9093:9090"
      - "9098:9095"
    environment:
      GRPC_ADDR: ":9090"
      METRICS_ADDR: ":9095"

  quoting-service:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: quoting-service
    ports:
      - "9094:9090"
      - "9099:9095"
    environment:
      GRPC_ADDR: ":9090"
      METRICS_ADDR: ":9095"

  notification-service:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: notification-service
    ports:
      - "9100:9090"
      - "9101:9095"
    environment:
      GRPC_ADDR: ":9090"
      METRICS_ADDR: ":9095"

  audit-service:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: audit-service
    environment:
      KAFKA_BROKERS: "redpanda:9092"
    depends_on:
      redpanda: { condition: service_healthy }

  migrate:
    image: postgres:16-alpine
    command:
      - sh
      - -c
      - "until pg_isready -h postgres -U switch; do sleep 1; done && psql '$$POSTGRES_DSN' -f /schema/0001_init.sql"
    environment:
      POSTGRES_DSN: "postgres://switch:switch@postgres:5432/switch?sslmode=disable"
    volumes:
      - ../../migrations/postgres/0001_init.sql:/schema/0001_init.sql
    depends_on:
      postgres: { condition: service_healthy }
