_format_version: "3.0"
_transform: true

services:
  # ---------------------------------------------------------------------------
  # Bank Payment API (mTLS on :8443)
  # ---------------------------------------------------------------------------
  - name: payment-service
    host: gateway
    port: 8080
    protocol: http
    read_timeout: 120000
    write_timeout: 120000
    connect_timeout: 10000
    routes:
      - name: payments
        paths:
          - /payments
        strip_path: false
        methods:
          - POST
          - GET
        plugins:
          - name: post-function
            config:
              access:
                - |
                  local dn = ngx.var.ssl_client_s_dn
                  if dn then
                    kong.service.request.set_header("X-Participant-Id", dn)
                  end
          - name: rate-limiting
            config:
              minute: 2000000
              policy: local
      - name: health
        paths:
          - /healthz
        strip_path: false
        methods:
          - GET

  # ---------------------------------------------------------------------------
  # Portal API — protected by Authentik forward-auth (HTTP on :8000)
  # ---------------------------------------------------------------------------
  - name: portal-api-service
    host: portal-api
    port: 8080
    protocol: http
    routes:
      - name: portal-api
        paths:
          - /portal/api
        strip_path: false
        protocols:
          - http
        plugins:
          # Inject X-Original-URL so Authentik's outpost can match the correct
          # proxy provider (configured for external_host http://localhost:8000).
          # Kong's forward-auth sub-request uses Host: authentik-server, so
          # without this header Authentik returns 404.
          - name: pre-function
            config:
              access:
                - |
                  local proto = kong.request.get_forwarded_scheme() or "http"
                  local host  = kong.request.get_forwarded_host()  or "localhost:8000"
                  local path  = kong.request.get_path()
                  local qs    = kong.request.get_raw_query()
                  local url   = proto .. "://" .. host .. path
                  if qs and qs ~= "" then url = url .. "?" .. qs end
                  kong.service.request.set_header("X-Original-URL", url)
          # Forward-auth: Kong sends a sub-request to Authentik's outpost.
          # On success Authentik returns 200 with X-authentik-* headers that
          # Kong copies upstream to portal-api.
          - name: forward-auth
            config:
              http_method: GET
              address: "http://auth-service:9000/auth"
              trust_response_headers:
                - X-authentik-uid
                - X-authentik-username
                - X-authentik-name
                - X-authentik-email
                - X-authentik-groups
                - X-User-Role
                - X-Participant-Id
          - name: rate-limiting
            config:
              minute: 300
              policy: local

  # ---------------------------------------------------------------------------
  # Portal SPA static files — also behind Authentik (HTTP on :8000)
  # ---------------------------------------------------------------------------
  - name: portal-spa-service
    host: portal-api
    port: 8080
    protocol: http
    routes:
      - name: portal-spa
        paths:
          - /portal
        strip_path: false
        protocols:
          - http
        plugins:
          - name: pre-function
            config:
              access:
                - |
                  local proto = kong.request.get_forwarded_scheme() or "http"
                  local host  = kong.request.get_forwarded_host()  or "localhost:8000"
                  local path  = kong.request.get_path()
                  local qs    = kong.request.get_raw_query()
                  local url   = proto .. "://" .. host .. path
                  if qs and qs ~= "" then url = url .. "?" .. qs end
                  kong.service.request.set_header("X-Original-URL", url)
          - name: forward-auth
            config:
              http_method: GET
              address: "http://auth-service:9000/auth"
              trust_response_headers:
                - X-authentik-uid
                - X-authentik-username
                - X-authentik-name
                - X-authentik-email
                - X-authentik-groups
                - X-User-Role
                - X-Participant-Id

  # ---------------------------------------------------------------------------
  # Auth Service — login/logout (unauthenticated, HTTP on :8000)
  # ---------------------------------------------------------------------------
  - name: auth-service
    host: auth-service
    port: 9000
    protocol: http
    routes:
      - name: auth-routes
        paths:
          - /login
          - /logout
        strip_path: false
        protocols:
          - http
