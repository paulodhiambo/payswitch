version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/orchestrator/db/schema/"
    queries: "internal/orchestrator/db/query/"
    gen:
      go:
        package: "sqlc"
        out: "internal/orchestrator/db/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_result_struct_pointers: true
        omit_unused_structs: true
