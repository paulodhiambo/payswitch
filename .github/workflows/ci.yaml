name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - run: go vet ./...
      - run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: portal/package-lock.json
      - name: Install dependencies
        run: |
          cd portal
          npm ci
      - name: Lint
        run: |
          cd portal
          npm run lint
      - name: Build
        run: |
          cd portal
          npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - name: Unit + contract tests
        run: go test -v -race -count=1 -timeout=120s ./cmd/... ./internal/... ./pkg/...
      - name: Build all binaries
        run: |
          for dir in cmd/*/; do
            binary=$(basename "$dir")
            go build -o /dev/null ./cmd/$binary
          done

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - name: Integration tests (Docker required)
        run: go test -v -race -count=1 -timeout=300s ./test/integration/...

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - name: Build all binaries
        run: make build
      - name: Copy binaries to VPS
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ubuntu
          SOURCE: bin/
          TARGET: /opt/payswitch/bin/
      - name: Copy systemd units to VPS
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ubuntu
          SOURCE: deploy/systemd/
          TARGET: /opt/payswitch/systemd/
          ARGS: -avz --delete --exclude=env
      - name: Install systemd units and restart services
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo mkdir -p /etc/payswitch
            sudo cp /opt/payswitch/systemd/payswitch-*.service /etc/systemd/system/
            if [ ! -f /etc/payswitch/env ]; then
              sudo cp /opt/payswitch/systemd/env /etc/payswitch/env
              echo "INFO: env template copied to /etc/payswitch/env — EDIT IT before starting services"
            fi
            sudo systemctl daemon-reload
            for svc in gateway compliance lookup settlement quoting notification routing reconciliation audit portal-api; do
              unit="payswitch-${svc}.service"
              if [ -f "/etc/systemd/system/$unit" ]; then
                sudo systemctl enable "$unit" 2>/dev/null
                sudo systemctl restart "$unit" || echo "WARN: $unit failed to start"
              else
                echo "WARN: $unit not found — skip"
              fi
            done

  docker:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - gateway
          - compliance-service
          - lookup-service
          - settlement-service
          - quoting-service
          - notification-service
          - routing-service
          - reconciliation-service
          - audit-service
          - portal-api
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
